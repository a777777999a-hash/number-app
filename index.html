<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>數字檢查工具</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, button { padding: 8px; margin: 5px; }
    table { border-collapse: collapse; margin-top: 15px; width: 100%; }
    th, td { border: 1px solid #333; padding: 6px 10px; text-align: center; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h2>數字檢查工具 (Excel 群組模式)</h2>
  <p>輸入數字（可多個，用逗號分隔）：</p>
  <input type="text" id="inputNumbers" placeholder="例如：11,22,35">
  <button onclick="checkNumbers()">檢查</button>
  <button onclick="resetAll()">清除紀錄</button>

  <table id="numberTable">
    <thead>
      <tr><th>A欄 固定數字群組</th><th>B欄 結果</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // ===== 你給的固定數字群組 =====
    const groups = [
      [1,10,19,28],
      [2,11,20,29],
      [3,12,21,30],
      [4,13,22,31],
      [5,14,23,32],
      [6,15,24,33],
      [7,16,25,34],
      [8,17,26,35],
      [9,18,27,36],
      [10,20,30],
      [1,11,21,31],
      [2,12,22,32],
      [3,13,23,33],
      [4,14,24,34],
      [5,15,25,35],
      [6,16,26,36],
      [7,17,27,37],
      [8,18,28,38],
      [9,19,29,39],
      [11,22,33],
      [1,3,5,7],[3,5,7,9],[5,7,9,11],[7,9,11,13],
      [9,11,13,15],[11,13,15,17],[13,15,17,19],
      [15,17,19,21],[17,19,21,23],[19,21,23,25],
      [21,23,25,27],[23,25,27,29],[25,27,29,31],
      [27,29,31,33],[29,31,33,35],[31,33,35,37],
      [33,35,37,39],[35,37,39,1],[37,39,1,3],
      [39,1,3,5],[2,4,6,8],[4,6,8,10],[6,8,10,12],
      [8,10,12,14],[10,12,14,16],[12,14,16,18],
      [14,16,18,20],[16,18,20,22],[18,20,22,24],
      [20,22,24,26],[22,24,26,28],[24,26,28,30],
      [26,28,30,32],[28,30,32,34],[30,32,34,36],
      [32,34,36,38],[34,36,38,2],[36,38,2,4],[38,2,4,6],
      [1,2,3,4],[2,3,4,5],[3,4,5,6],[4,5,6,7],
      [5,6,7,8],[6,7,8,9],[7,8,9,10],[8,9,10,11],
      [9,10,11,12],[10,11,12,13],[11,12,13,14],
      [12,13,14,15],[13,14,15,16],[14,15,16,17],
      [15,16,17,18],[16,17,18,19],[17,18,19,20],
      [18,19,20,21],[19,20,21,22],[20,21,22,23],
      [21,22,23,24],[22,23,24,25],[23,24,25,26],
      [24,25,26,27],[25,26,27,28],[26,27,28,29],
      [27,28,29,30],[28,29,30,31],[29,30,31,32],
      [30,31,32,33],[31,32,33,34],[32,33,34,35],
      [33,34,35,36],[34,35,36,37],[35,36,37,38],
      [36,37,38,39],[37,38,39,1],[38,39,1,2],[39,1,2,3]
    ];

    // ===== 從 localStorage 載入紀錄 =====
    let results = JSON.parse(localStorage.getItem("results") || "{}");

    // ===== 建立表格 =====
    const tbody = document.querySelector("#numberTable tbody");
    groups.forEach((grp, i) => {
      let key = grp.join("-");
      let tr = document.createElement("tr");
      tr.innerHTML = `<td>${grp.join(",")}</td><td id="cell-${key}">${results[key] || ""}</td>`;
      tbody.appendChild(tr);
    });

    // ===== 檢查輸入數字 =====
    function checkNumbers() {
      const input = document.getElementById("inputNumbers").value;
      const numbers = input.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n));

      groups.forEach(grp => {
        let key = grp.join("-");
        if (!results[key]) results[key] = 0;

        // 檢查是否有輸入數字在這組內
        if (numbers.some(n => grp.includes(n))) {
          results[key] = 0;
        } else {
          results[key] += 1;
        }

        document.getElementById(`cell-${key}`).innerText = results[key];
      });

      // 存回 localStorage
      localStorage.setItem("results", JSON.stringify(results));
    }

    // ===== 清除紀錄 =====
    function resetAll() {
      if (confirm("確定要清除所有紀錄嗎？")) {
        results = {};
        localStorage.removeItem("results");
        groups.forEach(grp => {
          let key = grp.join("-");
          document.getElementById(`cell-${key}`).innerText = "";
        });
      }
    }
  </script>
</body>
</html>
